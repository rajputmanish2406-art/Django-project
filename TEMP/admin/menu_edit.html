{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Menu Item</title>
    <link rel="stylesheet" href="{% static 'menu.css' %}">

     

</head>
<body>

<div class="container">
  <div class="card">
    <div class="card-header">
      Edit Menu Item
    </div>

    <form method="post" enctype="multipart/form-data" class="form-content">
      {% csrf_token %}

      <div class="form-group">
        <label for="item_name">Item Name</label>
        <input type="text" name="item_nam" id="item_nam" 
               value="{{ menu.item_name }}" required autofocus>
      </div>

      <div class="form-group">
        <label for="price">Price (₹)</label>
        <input type="number" name="price" id="price" step="0.01" min="0" 
               value="{{ menu.price }}" required>
      </div>

      <div class="form-group">
        <label for="category">Category</label>
        <select name="category" id="category" required>
          <option value="veg"    {% if menu.category == "veg"    %}selected{% endif %}>vegetable</option>
          <option value="Chicken" {% if menu.category == "Chicken" %}selected{% endif %}>Chicken</option>
          <option value="South Indian" {% if menu.category == "South Indian" %}selected{% endif %}>South Indian</option>
          <!-- Add more categories as needed -->
        </select>
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea name="description" id="description" rows="4">{{ menu.description }}</textarea>
      </div>
      <div class="form-group">
        <label>available</label>
        <input type="checkbox" name="available" id="available" {% if menu.is_available %}checked{% endif %}>
      </div>

      <div class="form-group">
        <label>Current Image</label>
        {% if menu.image %}
          <img src="{{ menu.image.url }}" alt="{{ menu.item_name }}" class="current-image">
        {% else %}
          <p style="color:#718096; font-style:italic;">No image uploaded yet</p>
        {% endif %}
        
        <label for="image">New Image (optional)</label>
        <input type="file" name="image" id="image" accept="image/*">
        <div class="image-hint">Max 2MB • JPG, PNG, WebP recommended</div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{% url 'menu_list' %}" class="btn btn-secondary">Cancel</a>
      </div>

    </form>
  </div>
</div>

</body>
</html>
