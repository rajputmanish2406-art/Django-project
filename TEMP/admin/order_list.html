{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'TableAdmin.css' %}">
</head>
<body>
    <h2>All orders</h2>
    <a href="{% url 'admindesh' %}" class="action-btn back-btn">Back </a><br>

    <table>
        <thead>
            <tr>
                <th>Order ID</th>
                <th>Customer</th>
                <th>Total</th>
                <th>Status</th>
                <th>date</th>
                <th>Paymat Status</th>
                <th>Details</th>
            </tr>
        </thead>
        <tbody>
            {% for o in orders %}
            <tr>
                <td style="width:20px;">#{{o.id}}</td>
                <td>{{o.user.username}}</td>
                <td>{{o.total_amount}}</td>
                <td>{{o.status}}</td>
                <td>{{o.created_at}}</td>
                <td>{{o.payment_method}}</td>
                <td><a href="{% url 'admin_order_detail' o.id %}">view</a></td>
            </tr>
            {% endfor %}
        </tbody>
        </table>
    
</body>
</html>
