<!DOCTYPE html>
<html>
<head>
  <title>Checkout</title>
  <style>
    body{font-family:Segoe UI;background:#f5f5f5;margin:0}
    .box{max-width:650px;margin:30px auto;background:#fff;padding:20px;border-radius:10px}
    input,textarea{width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:8px}
    button{width:100%;padding:12px;background:#ff4d4d;color:#fff;border:none;border-radius:10px;font-size:16px;cursor:pointer}
    .total{font-size:20px;font-weight:bold;margin-top:10px}
  </style>
</head>
<body>

<div class="box">
  <h2>📍 Delivery Address</h2>

  <form method="post" action="{% url 'place_order' %}">
    {% csrf_token %}

    <input type="text" name="full_name" placeholder="Full Name"
           value="{% if customer %}{{ customer.name }}{% endif %}" required>

    <input type="text" name="phone" placeholder="Phone"
           value="{% if customer %}{{ customer.phone }}{% endif %}" required>

    <textarea name="address" placeholder="Full Address" required></textarea>

    <input type="text" name="city" placeholder="City" required>
    <input type="text" name="pincode" placeholder="Pincode" required>

    <label><input type="radio" name="payment" value="online"> Online</label>
    <label><input type="radio" name="payment" value="cod"> COD</label>

    <div class="total">Total: ₹{{ total }}</div>

    <button type="submit">✅ Place Order</button>
  </form>
</div>

</body>
</html>
