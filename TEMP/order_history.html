<!DOCTYPE html>
<html>
<head>
<title>Order History</title>

<style>
body{
font-family:Arial;
background:#f4f6f9;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
margin-bottom:15px;
}

.status{
padding:5px 10px;
border-radius:20px;
font-size:13px;
}

.Pending{background:#fff3cd;}
.Accepted{background:#d4edda;}
.Delivered{background:#d1e7dd;}
.Cancelled{background:#f8d7da;}

.btn{
background:#4CAF50;
color:white;
padding:6px 12px;
border-radius:5px;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<h2>My Orders</h2>

{% for order in orders %}

<div class="card">

<h3>Order #{{ order.id }}</h3>

<p>
<strong>Status:</strong>
<span class="status {{ order.status }}">
{{ order.status }}
</span>
</p>

<p><strong>Total:</strong> ₹{{ order.total_amount }}</p>

<p><strong>Date:</strong> {{ order.created_at }}</p>

<a class="btn" href="{% url 'track_order' order.id %}">
View Details
</a>

</div>

{% empty %}

<p>No orders yet</p>

{% endfor %}

</div>

</body>
</html>
