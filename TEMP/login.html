<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Restaurant Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">

<div class="container">
  <div class="row justify-content-center">
    <div class="col-sm-10 col-md-7 col-lg-5 col-xl-4">

      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-4 p-md-5">

          <!-- Title -->
          <h2 class="text-center fw-bold mb-1 text-danger">
            Welcome Back 🍴
          </h2>
          <p class="text-center text-muted mb-4">
            Login to TasteByte
          </p>

          <!-- Login Form -->
          <form action="/login" method="POST">
            {% csrf_token %}

            <div class="form-floating mb-3">
              <input type="text" name="name" class="form-control"
                     id="name" placeholder="Name" required>
              <label for="name">Name</label>
            </div>

            <div class="form-floating mb-3">
              <input type="password" name="password" class="form-control"
                     id="password" placeholder="Password" required>
              <label for="password">Password</label>
            </div>

            <button type="submit"
                    class="btn btn-danger w-100 py-2 fw-semibold">
              Login
            </button>
          </form>

          <!-- Links -->
          <div class="text-center mt-4">
            <a href="/sign_up" class="text-decoration-none fw-semibold text-danger">
              Create Account
            </a>
            <span class="mx-2 text-muted">|</span>
            <a href="/logout" class="text-decoration-none fw-semibold text-secondary">
              Logout
            </a>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>

<!-- Alert -->
<script>
{% if alert1 %}
  alert("{{ alert1 }}");
{% endif %}
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
