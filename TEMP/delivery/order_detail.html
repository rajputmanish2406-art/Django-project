<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <table>
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Price</th>
                    <th>Qty</th>
                    <th>Subtotal</th>
                </tr>
            </thead>

            <tbody>
                {% for item in items %}
                <tr>
                    <td><strong>{{ item.product.item_name }}</strong></td>
                    <td>₹{{ item.price }}</td>
                    <td>{{ item.quantity }}</td>
                    <td style="color:var(--primary-color);font-weight:600;">
                        ₹{{ item.subtotal }}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    <h2>Order #{{ order.id }}</h2>
    <p>Phone: {{ order.phone }}</p>
    <p>Address: {{ order.address }}</p>
    <p>Total: ₹{{ order.total_amount }}</p>

<a href="{% url 'delivery_complete' order.id %}">
  Mark Delivered
</a>

</body>
</html>
