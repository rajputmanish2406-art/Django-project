<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Table Reservation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

/* Container */

.reservation-container{
background:white;
padding:35px;
border-radius:12px;
width:100%;
max-width:550px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* Title */

.reservation-container h2{
text-align:center;
margin-bottom:25px;
color:#333;
}

/* Error */

.error{
color:red;
text-align:center;
margin-bottom:15px;
font-weight:500;
}

/* Form */

.form-group{
margin-bottom:18px;
}

label{
display:block;
font-size:14px;
margin-bottom:6px;
color:#555;
}

input,
textarea{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
transition:0.3s;
}

input:focus,
textarea:focus{
border-color:#ff5a5f;
outline:none;
}

/* Button */

button{
width:100%;
padding:14px;
background:#ff5a5f;
border:none;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#e04b50;
}

/* Responsive */

@media(max-width:480px){

.reservation-container{
padding:25px;
}

button{
font-size:15px;
}

}

</style>

</head>

<body>

<div class="reservation-container">

<h2>Reserve Your Table</h2>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="post">
{% csrf_token %}

<div class="form-group">
<label>Full Name</label>
<input type="text" name="name" placeholder="Enter your name" required>
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="text" name="phone" placeholder="Enter phone number" required>
</div>

<div class="form-group">
<label>Date</label>
<input type="date" name="date" required>
</div>

<div class="form-group">
<label>Time</label>
<input type="time" name="time" required>
</div>

<div class="form-group">
<label>Guests</label>
<input type="number" name="guests" placeholder="Number of guests" required>
</div>

<div class="form-group">
<label>Special Request</label>
<textarea name="request" rows="3" placeholder="Any special request"></textarea>
</div>

<button type="submit">Reserve Table</button>

</form>

</div>

</body>
</html>
